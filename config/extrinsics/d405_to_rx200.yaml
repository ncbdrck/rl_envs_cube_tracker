# Static transform: rx200/base_link → Intel RealSense D405 color
# optical frame.
#
# *** CALIBRATE BEFORE USING ON HARDWARE. ***
# Same shape as the kinect2 / zed2 extrinsics — see kinect2_to_rx200.yaml
# for the full rationale. Placeholder pose assumes the D405 is mounted
# on a stand in front of the robot, looking back at the workspace.
#
# realsense2_camera default frame name is `camera_color_optical_frame`
# (camera namespace defaults to `camera`; tf_prefix defaults to the
# same). If you launch with a non-default camera name, update the
# child_frame here to match.

parent_frame: rx200/base_link
child_frame:  camera_color_optical_frame

translation:
  x:  0.50
  y:  0.00
  z:  0.50

rotation_rpy_deg:
  roll:  -90.0
  pitch:   0.0
  yaw:   -60.0
