# Static transform: NED2 base_link → Intel RealSense D405 color
# optical frame.
#
# *** CALIBRATE BEFORE USING ON HARDWARE. ***
# See d405_to_rx200.yaml for the full rationale. Parent frame is
# `base_link` (NED2 real bring-up uses bare URDF link names, no
# `ned2/` namespace).

parent_frame: base_link
child_frame:  camera_color_optical_frame

translation:
  x:  0.50
  y:  0.00
  z:  0.50

rotation_rpy_deg:
  roll:  -90.0
  pitch:   0.0
  yaw:   -60.0
